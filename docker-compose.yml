version: '3.8'
services:
  postgres:
    image: postgres:15
    container_name: w2w3
    environment:
      POSTGRES_PASSWORD: 114514
      POSTGRES_USER: postgres
      POSTGRES_DB: mydb
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data: